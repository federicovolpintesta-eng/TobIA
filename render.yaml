databases:
  - name: hotel_b2b_db
    databaseName: hotel_b2b
    user: admin
    plan: free

services:
  - type: web
    name: calidad-backend
    env: python
    plan: free
    buildCommand: "cd backend && ./build.sh"
    startCommand: "cd backend && gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hotel_b2b_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "calidad-backend.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: PYTHON_VERSION
        value: "3.11.2"
